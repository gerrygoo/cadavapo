<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dani Ponce — proyectos (staging)</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="staging.css">
</head>
<body class="page-staging">
  <main>
    <section class="hero">
      <h1><a href="index.html"><img class="logo" src="../assets/logo/dani_ponce_horizontal.png" alt="Dani Ponce"></a></h1>
      <p class="role" aria-live="polite">dirección creativa</p>
    </section>

    <section class="proyectos-group">
      <h2 data-i18n="proyectos.direccionCreativa">dirección creativa</h2>
      <div class="wireframe-placeholder">
        * carrusel con imágenes — clic lleva a otra página (sin proyectos asignados aún)
      </div>
    </section>

    <section class="proyectos-group">
      <h2 data-i18n="proyectos.disenoProduccion">diseño de producción</h2>
      <div class="wireframe-placeholder">* reel (próximamente)</div>
      <div class="proyectos-grid">
        <a class="proyecto-tile" href="proyectos/coffee-mate-nescafe.html">
          <picture>
            <source type="image/avif" srcset="../assets/projects/coffee-mate-nescafe/still-01.avif">
            <img src="../assets/projects/coffee-mate-nescafe/still-01.jpg" alt="Coffee Mate — Nescafé" loading="lazy" decoding="async">
          </picture>
          <span>Coffee Mate — Nescafé</span>
        </a>
        <a class="proyecto-tile" href="proyectos/didi-food.html">
          <picture>
            <source type="image/avif" srcset="../assets/projects/didi-food/mesa_cenital.avif">
            <img src="../assets/projects/didi-food/mesa_cenital.jpg" alt="Didi Food" loading="lazy" decoding="async">
          </picture>
          <span>Didi Food</span>
        </a>
        <a class="proyecto-tile" href="proyectos/reality-club-cinepolis.html">
          <picture>
            <source type="image/avif" srcset="../assets/projects/reality-club-cinepolis/bonbon_wide.avif">
            <img src="../assets/projects/reality-club-cinepolis/bonbon_wide.jpg" alt="Reality Club — Cinépolis" loading="lazy" decoding="async">
          </picture>
          <span>Reality Club — Cinépolis</span>
        </a>
        <a class="proyecto-tile" href="proyectos/luis-angel-el-flaco.html">
          <picture>
            <source type="image/avif" srcset="../assets/projects/luis-angel-el-flaco/still-01.avif">
            <img src="../assets/projects/luis-angel-el-flaco/still-01.jpg" alt="Luis Ángel — El Flaco" loading="lazy" decoding="async">
          </picture>
          <span>Luis Ángel — El Flaco</span>
        </a>
      </div>
    </section>

    <section class="proyectos-group">
      <h2 data-i18n="proyectos.otrosProyectos">otros proyectos</h2>
      <div class="proyectos-grid">
        <div class="proyecto-tile-placeholder">*</div>
        <div class="proyecto-tile-placeholder">*</div>
        <div class="proyecto-tile-placeholder">*</div>
      </div>
    </section>

    <nav class="staging-nav">
      <a href="#" data-i18n="nav.about"></a>
      <a href="proyectos.html" data-i18n="nav.projects"></a>
      <a href="#" data-i18n="nav.contact"></a>
    </nav>
  </main>

  <footer>
    <button id="lang-toggle" data-i18n="langBtn">idiomas</button>
  </footer>

  <script src="../js/translations.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
